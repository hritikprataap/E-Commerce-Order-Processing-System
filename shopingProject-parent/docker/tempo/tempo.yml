server:
  http_listen_port: 3100

distributor:
  receivers:
    zipkin:
      endpoint: 0.0.0.0:9411
    otlp:
      protocols:
        http:
        grpc:

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces

overrides:
  metrics_generator_processors: [service-graphs, span-metrics]
